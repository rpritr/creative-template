<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Creative Template</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Eczar:wght@400..800&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <nav class="header__nav">
                <ul class="header__nav-list">
                    <li class="header__nav-list-item">Home</li>
                    <li class="header__nav-list-item">Work</li>
                    <li class="header__nav-list-item">Testimonials</li>
                    <li class="header__nav-list-item">About</li>
                </ul>
            </nav>
        </header> <!-- e: header -->
        <main class="main">
            <div class="main__banner">
                <p class="main__banner--badge">👋 Hello All</p>
                <h1 class="main__banner--title">I’m Salman Khan,<br/>
                    A Creative Designer<br/>
                    and Storyteller</h1>
                <div class="main__banner--buttons">
                    <a class="btn btn-primary">View My Work <img src="assets/chevron-right-square.svg" alt="icon"></a>
                    <a class="btn btn-secondary">Contact Me</a>
                </div>
            </div>
            <div class="main__banner__image">
                <img src="assets/main.png" alt="banner image">
            </div>
        </main> <!-- e: main -->
        <footer class="footer">
            <div class="footer__cta">
                <h2 class="main__banner--title">Let’s work together and <br/>make everything super cute<br/> and super useful.</h2>
                <a class="btn btn-secondary">Contact Me</a>
            </div>
            <div class="footer__social">
                <img class="footer__social--image" src="assets/dribbble.svg" alt="social image">
                <img class="footer__social--image" src="assets/instagram.svg" alt="social image">
                <img class="footer__social--image" src="assets/pinterest.svg" alt="social image">
                <img class="footer__social--image" src="assets/linkedin.svg" alt="social image">
            </div>
        </footer> <!-- e:footer -->
    </div>
</body>
</html>
